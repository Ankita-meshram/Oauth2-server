<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Welcome Back</h1>

        <p>Login to your account</p>

        <form action="/login" method="post">

            <input type="email"
                   name="email"
                   placeholder="Enter Email">

            <input type="password"
                   name="password"
                   placeholder="Enter Password">

            <button type="submit">
                Login
            </button>

        </form>

        <div class="footer">

            Don't have an account?

            <a href="/register">
                Register
            </a>

        </div>

    </div>

</div>

</body>
</html>
